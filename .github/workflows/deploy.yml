name: Deploy Node App

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-node-app:v1 \
                     -t ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app:v1
        docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest
