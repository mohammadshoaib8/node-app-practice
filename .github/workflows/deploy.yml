name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build Docker image
    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest .

    # 4. Push image
    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest

    # 5. Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest
          docker stop my-app || true
          docker rm my-app || true
          docker run -d -p 3000:3000 --name my-app ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest
